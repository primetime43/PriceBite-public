name: Bug Report
description: Report a bug or issue with PriceBite
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the app is affected?
      options:
        - Store search
        - Menu fetching
        - Price comparison
        - Price history
        - Cheapest finder
        - Favorites
        - Admin dashboard
        - Specific provider/chain
        - Other
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Restaurant chain (if applicable)
      options:
        - Taco Bell
        - Wendy's
        - Burger King
        - Arby's
        - Five Guys
        - Chick-fil-A
        - N/A
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Search for ...
        3. Click ...
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: Screenshots, error messages, browser/OS info, etc.
    validations:
      required: false
